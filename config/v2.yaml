feature_extract_enable : false # 只能用 true or false
point_filter_num : 1
max_iteration : 10
dense_map_enable : 1
filter_size_surf : 0.3 # 0.3 不能太小，否则误差会 累计 的很快
filter_size_map : 0.4 # 0.4
cube_side_length : 100000
debug : 0
grid_size : 40
patch_size : 8
img_enable : 1
lidar_enable : 1
# outlier_threshold: The outlier threshold value of photometric error (square) of a single pixel. 
# It is recommended that 50~250 for the darker scenes, 500~1000 for the brighter scenes. 
# The smaller the value is, the faster the vio submodule is, but the weaker the anti-degradation ability is.
outlier_threshold : 800  #500
ncc_en: true
ncc_thre: 0.5
img_point_cov : 1000
laser_point_cov : 0.001
cam_fx: 430.885
cam_fy: 431.067
cam_cx: 324.299
cam_cy: 252.805

# cam_fx: 432.03715207
# cam_fy: 432.09322577
# cam_cx: 324.74811778
# cam_cy: 255.54341165


common:
    lid_topic:  "/velodyne_points"
    imu_topic:  "/livox/imu"

preprocess:
    lidar_type: 2  # Ouster #enum LID_TYPE{AVIA = 1, VELO16, OUST64}; //{1, 2, 3}
    scan_line: 16
    blind: 3 # blind x m disable

mapping:
    acc_cov_scale: 10 #10
    gyr_cov_scale: 10 #10
    fov_degree:    180
#    extrinsic_R: [ 1, 0, 0,
#                   0, 1, 0,
#                   0, 0, 1]
# using
    extrinsic_R: [ 0.999901 , 0.013091 ,-0.005085,
                   -0.013061 , 0.999897 , 0.005917 , 
                   0.005162 , -0.005850 , 0.999970 ]
    extrinsic_T: [ 0.081677, 0.168409, 0.141423]
    # extrinsic_T: [0.088, 0.156, 0.154]


camera:
    img_topic: /camera/image_color
    img_rate: 10 #自定义，对图像的频率进行控制

